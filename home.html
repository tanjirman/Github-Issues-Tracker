<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- fav-icon -->
    <link
      rel="shortcut icon"
      href="assets/github-logo.png"
      type="image/x-icon"
    />
    <title>Home page</title>
    <!-- css link -->
    <link rel="stylesheet" href="styles/tailwind.config.css" />
    <!-- font-awesome icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- tailwind + daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
<body class="geist-font">
    <!-- navbar -->
    <header class=" ">
      <div class="navbar bg-base-100 shadow-sm justify-between">
        <div class="flex items-center pl-20">
          <img class="w-[30px]" src="assets/github-logo.png" alt="" /><span
            class="font-bold ml-2"
            >GitHub Issues Tracker</span
          >
        </div>
        <div class="flex gap-2 pr-20">
          <input
            type="text"
            placeholder="🔍 Search issues..."
            id="search-input"
            class="input input-bordered w-24 md:w-auto"
          />
          <button onclick="searchIssues()" class="btn btn-primary">
            <i class="fa-solid fa-plus"></i>New Issue
          </button>
        </div>
      </div>
    </header>
    <!-- Tabs section -->
    <section class="w-10/12 mx-auto pt-15">
      <div class="shadow p-5">
        <button class="tab-btn btn btn-primary px-4">All</button>
        <button class="tab-btn btn">Open</button>
        <button class="tab-btn btn">Closed</button>
      </div>
    </section>
    <!--All card section -->
    <section class="w-10/12 mx-auto pt-15">
      <!-- issue icon -->
      <div class="shadow p-5 flex justify-between">
        <div class="flex gap-3">
          <img class="w-10" src="assets/Aperture.png" alt="" />
          <div>
            <h3 class="text-xl font-bold">50 Issues</h3>
            <p class="text-gray-400">Track and manage your project issues</p>
          </div>
        </div>
        <!-- open closed  -->
        <div class="flex gap-2">
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-[#00A96E] rounded-full"></div>
            <span>Open</span>
          </div>

          <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div>
            <span>Closed</span>
          </div>
        </div>
      </div>
    </section><!-- cards section -->
    <section class="w-10/12 shadow mx-auto py-10">
      <!-- Spinner -->
      <div id="loading-spinner" class="flex justify-center items-center py-10">
        <span class="loading loading-spinner loading-lg text-primary"></span>
      </div>

      <div
        id="issue-container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-5"
      ></div>
    </section><!-- card details -->
    <section>
      <!-- modal -->
      <dialog id="card_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
          <div id="details-container">
            <!-- content will be dynamically fetched here -->
          </div>

          <div class="modal-action">
            <form method="dialog">
              <button class="btn bg-blue-600 text-white border-none">
                Close
              </button>
            </form>
          </div>
        </div>
      </dialog>
    </section>
    <!-- js file -->
    <script src="JS/script.js"></script>
  </body>
</html>
</body>
</html>
